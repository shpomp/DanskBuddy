        height: 100%;

        align-items: center;
        justify-content: center;

        width: 100%;
        height: 100%;

      }
      #__bundler_placeholder {
        color: #999;
        font-size: 14px;
      }

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]'
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]'
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render"
                    );
                  }
                }

                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([finalBytes], { type: entry.mime })
                );
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([], { type: entry.mime })
                );
              }
            })
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]'
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap)
              .split("</" + "script>")
              .join("<\\/" + "script>") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: fetch and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

ound\"><path d=\"m5 12 5 5 9-11\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:13.5px;font-weight:600;color:#3A352F\">Meet people from other cultures<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:22px;height:22px;border-radius:50%;background:#FDEAEC;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E63946\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m5 12 5 5 9-11\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:13.5px;font-weight:600;color:#3A352F\">Improve my everyday English<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #EFE8DD;border-radius:20px;padding:20px\"><div style=\"font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#A89F94;margin-bottom:12px\">Availability<\u002Fdiv><div style=\"display:flex;align-items:center;gap:9px\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C97F35\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4l3 2\"><\u002Fpath><\u002Fsvg><span style=\"font-size:14px;font-weight:700;color:#2B2A28\">Flexible<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:#7C756B\">· evenings &amp; weekends<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv><span style=\"font-size:12px;font-weight:700;color:#A89F94\">Web<\u002Fspan><\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"text-align:center;font-size:13px;font-weight:600;color:#A89F94;padding-top:8px\">danskbuddy MVP · HYF Technologies — Iryna · Jyoti · Rufaisa &nbsp;·&nbsp; every page in mobile + web · tap likes, filters, level cards &amp; \"Vis oversættelse\" to try the interactions.<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:1000}}\">\nclass Component extends DCLogic {\n  state = {\n    role: 'learner',\n    level: 'A2',\n    likes: { p3: true },\n    connected: { u2: true },\n    filters: { online: true, native: false, level: false },\n    bconn: { u4: true },\n    trans: {},\n    interests: { 'Hygge': true, 'Cycling': true, 'Music': false, 'Football': false, 'Cooking': false, 'Travel': true, 'Movies': false, 'Coffee': true },\n  };\n\n  lvl(l) {\n    const f = (l || 'A')[0];\n    if (f === 'A') return { bg: '#FDE7C1', fg: '#C97F35' };\n    if (f === 'B') return { bg: '#FDEAEC', fg: '#E63946' };\n    return { bg: '#FAD2D5', fg: '#B0202C' };\n  }\n  bToggle(id) { const m = Object.assign({}, this.state.bconn); m[id] = !m[id]; this.setState({ bconn: m }); }\n  bCheck(c) { return React.createElement('svg', { width: 15, height: 15, viewBox: '0 0 24 24', fill: 'none', stroke: c, strokeWidth: 3, strokeLinecap: 'round', strokeLinejoin: 'round' }, React.createElement('path', { d: 'm5 12 5 5 9-11' })); }\n  bPlus(c) { return React.createElement('svg', { width: 15, height: 15, viewBox: '0 0 24 24', fill: 'none', stroke: c, strokeWidth: 2.6, strokeLinecap: 'round', strokeLinejoin: 'round' }, React.createElement('path', { d: 'M12 5v14M5 12h14' })); }\n  toggle(map, id) { const m = Object.assign({}, this.state[map]); m[id] = !m[id]; this.setState({ [map]: m }); }\n  toggleLike(id) { this.toggle('likes', id); }\n  toggleConnect(id) { this.toggle('connected', id); }\n  toggleTrans(id) { this.toggle('trans', id); }\n  toggleInterest(k) { this.toggle('interests', k); }\n  toggleFilter(k) { this.toggle('filters', k); }\n  setRole(r) { this.setState({ role: r }); }\n  setLevel(c) { this.setState({ level: c }); }\n\n  renderVals() {\n    const st = this.state;\n\n    const partnerBase = [\n      { id: 'u1', name: 'Sofie', initials: 'SO', color: '#E07A5F', city: 'Aarhus', age: 26, native: 'DK', learning: 'EN', level: 'C1', online: true, interests: ['Hygge', 'Books', 'Cycling'] },\n      { id: 'u3', name: 'Lena', initials: 'LE', color: '#E8836B', city: 'Odense', age: 24, native: 'DE', learning: 'DK', level: 'B1', online: true, interests: ['Music', 'Movies'] },\n      { id: 'u5', name: 'Anders', initials: 'AN', color: '#5B8DEF', city: 'Aalborg', age: 29, native: 'DK', learning: 'EN', level: 'C1', online: false, interests: ['Cycling', 'Coffee', 'Football'] },\n    ];\n    const partners = partnerBase.map(p => {\n      const c = !!st.connected[p.id]; const lb = this.lvl(p.level);\n      return Object.assign({}, p, {\n        connected: c, btnLabel: c ? 'Anmodet' : 'Connect',\n        btnBg: c ? '#FDEAEC' : '#E63946', btnFg: c ? '#D62F3C' : '#FFFFFF', btnBorder: c ? '#F4C9CD' : '#E63946',\n        lvBg: lb.bg, lvFg: lb.fg, onlineDisp: p.online ? 'block' : 'none',\n        onConnect: () => this.toggleConnect(p.id),\n      });\n    });\n\n    const postBase = [\n      { id: 'p1', name: 'Sofie', initials: 'SO', color: '#E07A5F', level: 'C1', verified: true, time: '2t', text: 'God morgen! Hvem vil øve sig på dansk small talk i dag? Skriv en kommentar herunder 👋', img: false, likes: 24, comments: 8 },\n      { id: 'p2', name: 'Lena', initials: 'LE', color: '#E8836B', level: 'B1', verified: false, time: '5t', text: 'Min første sprogcafé i Odense — så nervøs, men alle var super søde. Tak for tippene! 🫶', img: true, likes: 41, comments: 12 },\n    ];\n    const posts = postBase.map(p => {\n      const liked = !!st.likes[p.id]; const lb = this.lvl(p.level); const cnt = p.likes + (liked ? 1 : 0);\n      return Object.assign({}, p, {\n        lvBg: lb.bg, lvFg: lb.fg, likeCount: cnt,\n        heartFill: liked ? '#E63946' : 'none', heartStroke: liked ? '#E63946' : '#A89F94', likeColor: liked ? '#E63946' : '#7C756B',\n        imgDisp: p.img ? 'flex' : 'none', verDisp: p.verified ? 'flex' : 'none',\n        onLike: () => this.toggleLike(p.id),\n      });\n    });\n\n    const msgBase = [\n      { id: 'm1', kind: 'them', text: 'Hej Maria! Klar til at øve lidt i dag? 😊', translation: 'Hi Maria! Ready to practice a bit today?' },\n      { id: 'm2', kind: 'me', text: 'Hej Sofie! Ja, jeg er lidt nervøs men klar.' },\n      { id: 'm3', kind: 'corr', text: 'Lille rettelse: \"…lidt nervøs, men jeg er klar.\" 👍', sub: 'You said it almost perfectly!' },\n      { id: 'm4', kind: 'me', text: 'Tak! Det hjælper meget.' },\n      { id: 'm5', kind: 'them', text: 'Selv tak! Skal vi tales ved kl. 17?', translation: 'You\\u2019re welcome! Shall we talk at 5pm?' },\n    ];\n    const msgs = msgBase.map(m => {\n      const showT = !!st.trans[m.id];\n      let s;\n      if (m.kind === 'me') s = { justify: 'flex-end', align: 'flex-end', bg: '#E63946', fg: '#FFFFFF', border: 'transparent', radius: '18px 18px 6px 18px' };\n      else if (m.kind === 'corr') s = { justify: 'flex-start', align: 'flex-start', bg: '#FDE7C1', fg: '#2B2A28', border: '#F4D4A0', radius: '16px' };\n      else s = { justify: 'flex-start', align: 'flex-start', bg: '#FFFFFF', fg: '#2B2A28', border: '#ECE6DD', radius: '18px 18px 18px 6px' };\n      const hasTrans = !!m.translation;\n      return Object.assign({}, m, s, {\n        corrDisp: m.kind === 'corr' ? 'block' : 'none',\n        subDisp: m.sub ? 'block' : 'none',\n        transRowDisp: hasTrans ? 'block' : 'none',\n        transTextDisp: (hasTrans && showT) ? 'block' : 'none',\n        transLabel: showT ? 'Skjul oversættelse' : 'Vis oversættelse',\n        onTrans: () => this.toggleTrans(m.id),\n      });\n    });\n\n    const reqBase = [\n      { id: 'r1', name: 'Lena', initials: 'LE', color: '#E8836B', level: 'B1', line: 'Vil øve dansk · 3 fælles interesser' },\n      { id: 'r2', name: 'Tobias', initials: 'TO', color: '#F4A261', level: 'C1', line: 'Native speaker · Aarhus' },\n    ];\n    const requests = reqBase.map(r => { const lb = this.lvl(r.level); return Object.assign({}, r, { lvBg: lb.bg, lvFg: lb.fg }); });\n\n    const mpBase = [\n      { id: 'pa1', name: 'Sofie', initials: 'SO', color: '#E07A5F', level: 'C1', last: 'Online nu', online: true },\n      { id: 'pa2', name: 'Mikkel', initials: 'MI', color: '#5B8DEF', level: 'C2', last: 'Aktiv for 1t siden', online: false },\n      { id: 'pa3', name: 'Priya', initials: 'PR', color: '#9B7EDE', level: 'A2', last: 'Aktiv i går', online: false },\n    ];\n    const matchPartners = mpBase.map(m => { const lb = this.lvl(m.level); return Object.assign({}, m, { lvBg: lb.bg, lvFg: lb.fg, onlineDisp: m.online ? 'block' : 'none', lastColor: m.online ? '#2E9C6A' : '#A89F94' }); });\n\n    const chatList = [\n      { name: 'Mikkel', initials: 'MI', color: '#5B8DEF', last: 'Tak for i går! 🙌', online: false },\n      { name: 'Lena', initials: 'LE', color: '#E8836B', last: 'Vi ses til sprogcaféen', online: true },\n      { name: 'Anders', initials: 'AN', color: '#5B8DEF', last: 'God idé — lad os prøve', online: false },\n    ];\n\n    const events = [\n      { id: 'e1', day: '18', mon: 'JUN', title: 'Sprogcafé · Coffee & Danish', time: '17:00', place: 'Café Hygge, Aarhus', who: '12 deltager', type: 'Fysisk', dateBg: '#FDEAEC', dateFg: '#E63946', typeBg: '#FDEAEC', typeFg: '#E63946' },\n      { id: 'e2', day: '21', mon: 'JUN', title: 'Begynder-snak (A1–A2)', time: '19:00', place: 'Online · Video', who: '8 deltager', type: 'Online', dateBg: '#FDE7C1', dateFg: '#C97F35', typeBg: '#FDE7C1', typeFg: '#C97F35' },\n      { id: 'e3', day: '24', mon: 'JUN', title: 'Hygge & brætspilsaften', time: '18:30', place: 'Aalborg', who: '20 deltager', type: 'Fysisk', dateBg: '#FDEAEC', dateFg: '#E63946', typeBg: '#FDEAEC', typeFg: '#E63946' },\n    ];\n\n    const lvDefs = [\n      { c: 'A1', l: 'Begynder' }, { c: 'A2', l: 'Let øvet' }, { c: 'B1', l: 'Øvet' },\n      { c: 'B2', l: 'Rutineret' }, { c: 'C1', l: 'Avanceret' }, { c: 'C2', l: 'Flydende' },\n    ];\n    const levels = lvDefs.map(l => {\n      const sel = st.level === l.c;\n      return { c: l.c, l: l.l, sel, border: sel ? '#E63946' : '#ECE6DD', bg: sel ? '#FDEAEC' : '#FFFFFF', codeColor: sel ? '#D62F3C' : '#2B2A28', checkDisp: sel ? 'flex' : 'none', onSelect: () => this.setLevel(l.c) };\n    });\n\n    const interests = Object.keys(st.interests).map(k => {\n      const a = st.interests[k];\n      return { label: k, active: a, bg: a ? '#FDEAEC' : '#FFFFFF', border: a ? '#F4C9CD' : '#ECE6DD', color: a ? '#D62F3C' : '#6E665C', onToggle: () => this.toggleInterest(k) };\n    });\n\n    const fDefs = [{ k: 'online', label: 'Online nu' }, { k: 'native', label: 'Native' }, { k: 'level', label: 'Niveau B1–B2' }];\n    const filters = fDefs.map(f => {\n      const a = !!st.filters[f.k];\n      return { label: f.label, active: a, bg: a ? '#E63946' : '#FFFFFF', border: a ? '#E63946' : '#ECE6DD', color: a ? '#FFFFFF' : '#6E665C', onToggle: () => this.toggleFilter(f.k) };\n    });\n\n    // ---- Matches: all states (received/sent requests, declined, connected) ----\n    const mReqBase = [\n      { name: 'Sofie Lund', initials: 'SO', color: '#E07A5F', city: 'Aarhus', level: 'C1', line: 'Loves hygge & coffee chats', dir: 'received' },\n      { name: 'Lena Bauer', initials: 'LE', color: '#E8836B', city: 'Odense', level: 'B1', line: 'Practising Danish every day', dir: 'received' },\n      { name: 'Mikkel S.', initials: 'MI', color: '#5B8DEF', city: 'Copenhagen', level: 'C1', line: 'Free most evenings', dir: 'received' },\n      { name: 'Anders Holm', initials: 'AN', color: '#9B7EDE', city: 'Aalborg', level: 'C1', line: 'Cyclist, happy to help', dir: 'sent' },\n    ];\n    const mReq = mReqBase.map(p => { const lb = this.lvl(p.level); const rec = p.dir === 'received';\n      return Object.assign({}, p, { lvBg: lb.bg, lvFg: lb.fg,\n        tagLabel: rec ? 'Received' : 'Sent', tagBg: rec ? '#FDEAEC' : '#F1ECE3', tagColor: rec ? '#D62F3C' : '#8A8175',\n        recIconDisp: rec ? 'inline-flex' : 'none', sentIconDisp: rec ? 'none' : 'inline-flex',\n        actionsDisp: rec ? 'flex' : 'none', sentDisp: rec ? 'none' : 'flex' });\n    });\n    const mReqMobile = mReq.slice(0, 3);\n\n    const mDecBase = [\n      { name: 'Tobias Vest', initials: 'TO', color: '#5B8DEF', city: 'Esbjerg', level: 'B2', by: 'you' },\n      { name: 'Camilla Toft', initials: 'CA', color: '#E07A5F', city: 'Vejle', level: 'C1', by: 'them' },\n    ];\n    const mDeclined = mDecBase.map(p => { const lb = this.lvl(p.level); const byYou = p.by === 'you';\n      return Object.assign({}, p, { lvBg: lb.bg, lvFg: lb.fg,\n        badgeText: byYou ? 'You declined' : p.name.split(' ')[0] + ' declined',\n        badgeBg: byYou ? '#F1ECE3' : '#FBF1DE', badgeColor: byYou ? '#8A8175' : '#C97F35', badgeBorder: byYou ? '#E4DCCF' : '#F0DEB4',\n        reconnectDisp: byYou ? 'flex' : 'none' });\n    });\n\n    const mConBase = [\n      { name: 'Sofie', initials: 'SO', color: '#E07A5F', level: 'C1', online: true, lastActive: 'Active now' },\n      { name: 'Mikkel', initials: 'MI', color: '#5B8DEF', level: 'C2', online: false, lastActive: 'Active 1h ago' },\n      { name: 'Priya', initials: 'PR', color: '#9B7EDE', level: 'A2', online: false, lastActive: 'Active yesterday' },\n      { name: 'Anders', initials: 'AN', color: '#4FB286', level: 'C1', online: true, lastActive: 'Active now' },\n    ];\n    const mConnected = mConBase.map(p => { const lb = this.lvl(p.level);\n      return Object.assign({}, p, { lvBg: lb.bg, lvFg: lb.fg, onlineDisp: p.online ? 'block' : 'none', lastColor: p.online ? '#2E9C6A' : '#A89F94' });\n    });\n\n    const role = st.role;\n\n    // ---- Browse (Find partners) — redesigned cards ----\n    const browseBase = [\n      { id: 'u1', name: 'Lars Andersen', emoji: '👨', avatarBg: '#E7EEFC', city: 'Aarhus', native: 'DK', learning: 'EN', level: 'native', verified: true, online: true, bio: 'IT developer from Aarhus. Happy to chat about tech over coffee.', tags: ['sports', 'technology', 'music'] },\n      { id: 'u2', name: 'Sofie Christensen', emoji: '👩', avatarBg: '#FCEBD6', city: 'Odense', native: 'DK', learning: 'EN', level: 'native', verified: true, online: true, bio: 'Teacher and book lover from Odense. Patient with beginners!', tags: ['art', 'books', 'culture', 'food'] },\n      { id: 'u3', name: 'Mikkel Sørensen', emoji: '🧑', avatarBg: '#E3F0E8', city: 'Copenhagen', native: 'DK', learning: 'EN', level: 'native', verified: false, online: false, bio: 'Student at DTU. Available most evenings.', tags: ['travel', 'technology', 'food'] },\n      { id: 'u4', name: 'Lena Bauer', emoji: '👱', avatarBg: '#F1E7F5', city: 'Odense', native: 'DE', learning: 'DK', level: 'B1', verified: false, online: true, bio: 'Moved from Berlin, practising Danish every day.', tags: ['music', 'movies'] },\n      { id: 'u5', name: 'Anders Holm', emoji: '🧑', avatarBg: '#FCEBD6', city: 'Aalborg', native: 'DK', learning: 'EN', level: 'native', verified: true, online: false, bio: 'Cyclist and football fan. Love a good language swap.', tags: ['cycling', 'coffee', 'football'] },\n      { id: 'u6', name: 'Priya Nair', emoji: '👩', avatarBg: '#E7EEFC', city: 'Copenhagen', native: 'EN', learning: 'DK', level: 'A2', verified: true, online: true, bio: 'New in CPH, learning Danish for work. Keen to practise!', tags: ['cooking', 'travel', 'films'] },\n    ];\n    const browse = browseBase.map(p => {\n      const c = !!st.bconn[p.id]; const lb = this.lvl(p.level);\n      const tags = p.tags.slice(0, 3); const more = p.tags.length - tags.length;\n      return Object.assign({}, p, {\n        tags, moreDisp: more > 0 ? 'inline' : 'none', moreLabel: '+' + more,\n        lvBg: lb.bg, lvFg: lb.fg,\n        onlineDisp: p.online ? 'block' : 'none', verDisp: p.verified ? 'inline-flex' : 'none',\n        bConnected: c, bBtnLabel: c ? 'Requested' : 'Connect',\n        bBtnBg: c ? '#FDEAEC' : '#E63946', bBtnFg: c ? '#D62F3C' : '#fff', bBtnBorder: c ? '#F4C9CD' : '#E63946',\n        bBtnIcon: c ? this.bCheck('#D62F3C') : this.bPlus('#fff'),\n        onBConnect: () => this.bToggle(p.id),\n      });\n    });\n    const browseMobile = browse.slice(0, 4);\n    const bDropdowns = [{ label: 'City' }, { label: 'Role' }, { label: 'Danish level' }, { label: 'Availability' }];\n    return {\n      partners, posts, msgs, requests, matchPartners, chatList, events, levels, interests, filters,\n      mReq, mReqMobile, mDeclined, mConnected,\n      browse, browseMobile, bDropdowns,\n      setLearner: () => this.setRole('learner'), setNative: () => this.setRole('native'),\n      learnerBg: role === 'learner' ? '#E63946' : 'transparent', learnerFg: role === 'learner' ? '#FFFFFF' : '#7C756B',\n      nativeBg: role === 'native' ? '#E63946' : 'transparent', nativeFg: role === 'native' ? '#FFFFFF' : '#7C756B',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
    </script>
